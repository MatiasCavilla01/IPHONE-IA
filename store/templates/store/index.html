<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSV Store | Tienda</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* 1. Reset de cuerpo y tipografía */
        body { background-color: #ffffff; color: #111; font-family: 'Inter', -apple-system, sans-serif; }
        
        /* 2. Navbar limpia */
        .navbar { background-color: #ffffff; padding-top: 20px; padding-bottom: 20px; border-bottom: 1px solid #eaeaea; }
        .navbar-brand { color: #000 !important; font-size: 1.5rem; letter-spacing: -0.5px; }
        
        /* 3. La nueva Tarjeta de Producto */
        .product-card { border: none; background: transparent; transition: transform 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); }
        
        /* 4. El "Cubo" Gris para la imagen */
        .img-container { 
            background-color: #f4f4f4; 
            border-radius: 20px; 
            padding: 40px 20px; 
            position: relative;
            text-align: center;
            margin-bottom: 15px;
        }
        .img-container img { max-height: 180px; object-fit: contain; mix-blend-mode: darken; }
        
        /* 5. Etiquetas y Botones */
        .tag-category { position: absolute; top: 15px; right: 20px; font-size: 0.75rem; color: #888; font-weight: 600; }
        .btn-add-chart { background-color: white; border: 1px solid #ddd; color: #333; border-radius: 20px; font-size: 0.8rem; font-weight: 600; padding: 8px 15px; transition: all 0.2s; }
        .btn-add-chart:hover { border-color: #111; background-color: #f9f9f9; }
        .btn-buy-now { background-color: #111; color: white; border-radius: 20px; font-size: 0.8rem; font-weight: 600; padding: 8px 15px; border: none; transition: all 0.2s; }
        .btn-buy-now:hover { background-color: #333; color: white; }
        
        /* 6. Utilidades del Sidebar */
        #contenedor-productos { transition: opacity 0.3s ease-in-out; }
        .sidebar-link { transition: color 0.2s; cursor: pointer; }
        .sidebar-link:hover { color: #000 !important; font-weight: 600; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top bg-white border-bottom mb-4">
    <div class="container-fluid px-4 px-lg-5">
        <a class="navbar-brand fw-bold" href="{% url 'index' %}" style="letter-spacing: -1px;">VSV STORE</a>
        <div class="d-flex ms-auto align-items-center">
            <a href="{% url 'cart_summary' %}" class="btn btn-light rounded-pill px-3 fw-bold text-dark border-0 shadow-sm" id="cart-count">
                🛒 Carrito: (0)
            </a>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 px-lg-5">
    <div class="row">
        
        <aside class="col-lg-2 col-md-3 mb-5">
            <div class="sticky-top" style="top: 100px;">
                
                <div class="mb-5">
                    <h6 class="text-uppercase fw-bold text-muted mb-3" style="font-size: 0.7rem; letter-spacing: 1.5px;">Colecciones</h6>
                    <div class="list-group list-group-flush border-0">
                        <a href="{% url 'index' %}" class="list-group-item list-group-item-action border-0 px-0 category-link active-custom">
                            <div class="d-flex align-items-center justify-content-between w-100">
                                <span>📱 Todos los productos</span>
                                <span class="badge rounded-pill bg-dark text-white shadow-sm" style="font-size: 0.6rem;">★</span>
                            </div>
                        </a>
                        {% for cat in categorias %}
                            <a href="?categoria={{ cat.nombre }}" class="list-group-item list-group-item-action border-0 px-0 category-link">
                                <span>↳ {{ cat.nombre|capfirst }}</span>
                                <i class="bi bi-chevron-right small opacity-50"></i>
                            </a>
                        {% endfor %}
                    </div>
                </div>

                <div class="mb-4">
                    <h6 class="text-uppercase fw-bold text-muted mb-3" style="font-size: 0.7rem; letter-spacing: 1.5px;">Explorar</h6>
                    <div class="d-grid gap-2">
                        <a href="#" class="btn btn-light border-0 text-start rounded-3 py-2 px-3 explore-btn">
                            ✨ <span class="ms-2">Novedades</span>
                        </a>
                        <a href="#" class="btn btn-light border-0 text-start rounded-3 py-2 px-3 explore-btn">
                            🔥 <span class="ms-2">Más Vendidos</span>
                        </a>
                        <a href="#" class="btn btn-light border-0 text-start rounded-3 py-2 px-3 explore-btn">
                            🏷️ <span class="ms-2">En Oferta</span>
                        </a>
                    </div>
                </div>
            </div>
        </aside>

        <main class="col-lg-10 col-md-9">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-5 pb-3">
                <div>
                    <h1 class="fw-extrabold m-0" style="letter-spacing: -2px; font-size: 2.5rem;">Todo lo que buscás</h1>
                    <p class="text-muted small">Tecnología premium a tu alcance.</p>
                </div>
                <div class="position-relative mt-3 mt-md-0" style="width: 100%; max-width: 350px;">
                    <input id="buscador-realtime" class="form-control rounded-pill bg-light border-0 ps-4 py-3 shadow-sm" type="search" placeholder="Buscar en VSV Store...">
                </div>
            </div>

            <div id="contenedor-productos">
                {% include 'store/product_list_partial.html' %}
            </div>
        </main>
        
    </div>
</div>

<style>
    /* Tipografía y Pesos */
    .fw-extrabold { font-weight: 800; }
    
    /* Links de Categorías - Limpieza Apple Style */
    .category-link {
        font-size: 0.95rem;
        color: #666 !important;
        transition: all 0.3s ease;
        padding-top: 10px;
        padding-bottom: 10px;
    }
    
    .category-link:hover {
        color: #000 !important;
        padding-left: 8px !important;
    }

    .active-custom {
        color: #000 !important;
        font-weight: 700 !important;
    }

    /* Botones de Explorar */
    .explore-btn {
        background-color: #f8f9fa;
        color: #444;
        font-size: 0.9rem;
        font-weight: 600;
        transition: all 0.2s ease;
    }

    .explore-btn:hover {
        background-color: #000 !important;
        color: #fff !important;
        transform: scale(1.02);
    }

    /* Animaciones de Cards (Ya las tenías, las mantengo) */
    .product-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.08) !important;
    }
</style>
<style>
    .fw-extrabold { font-weight: 800; }
    
    .product-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.08) !important;
    }

    .btn-add:hover {
        background-color: #333 !important;
        transform: scale(1.02);
    }

    .buy-btn-icon:hover {
        background-color: #f8f9fa;
        border-color: #000;
        transform: rotate(-10deg);
    }

    .variant-selector:focus {
        box-shadow: none;
        background-color: #eeeeee;
    }

    /* Ocultar flechas del input number para que sea más limpio */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
        -webkit-appearance: none; 
        margin: 0; 
    }
</style>

<script>
    document.querySelectorAll('.variant-selector').forEach(select => {
        select.addEventListener('change', function() {
            const productId = this.getAttribute('data-product-id');
            const basePrice = parseFloat(this.getAttribute('data-base-price'));
            const selectedOption = this.options[this.selectedIndex];
            const extra = parseFloat(selectedOption.getAttribute('data-precio')) || 0;
            
            const total = basePrice + extra;
            const priceDisplay = document.getElementById('display-price-' + productId);
            
            priceDisplay.innerText = '$' + total.toLocaleString('es-AR', {minimumFractionDigits: 0});
        });
    });
</script>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
// LÓGICA DEL CARRITO
$(document).off('click', '.btn-add').on('click', '.btn-add', function(e){
    e.preventDefault();
    let productid = $(this).data('index');
    $.ajax({
        type: 'POST',
        url: '{% url "cart_add" %}',
        data: {
            product_id: productid,
            product_qty: $('#qty-' + productid).val(),
            csrfmiddlewaretoken: '{{ csrf_token }}',
            action: 'post'
        },
        success: function(json){
            document.getElementById("cart-count").textContent = "🛒 Carrito: (" + json.qty + ")";
        }
    });
});

// LÓGICA DEL SIDEBAR (Filtro por Categorías)
$(document).on('click', '.categoria-filtro', function(e){
    e.preventDefault(); // Evita que recargue la página
    
    // 1. Efectos visuales de estado (Cambio de cuadrito y color)
    $('.categoria-filtro').removeClass('text-dark fw-bold').addClass('text-muted sidebar-link');
    $('.icono-estado').text('⬜'); // Todos los cuadritos a blanco
    
    $(this).removeClass('text-muted sidebar-link').addClass('text-dark fw-bold');
    $(this).find('.icono-estado').text('🔲'); // El clickeado a negro
    
    // 2. Armar la consulta AJAX
    let categoria_id = $(this).data('id');
    let texto_buscador = $('#buscador-realtime').val(); // Revisamos si hay texto escrito
    let data_ajax = {};
    
    if (categoria_id !== 'todas') { data_ajax['categoria_id'] = categoria_id; }
    if (texto_buscador) { data_ajax['search'] = texto_buscador; }
    
    // 3. Ejecutar AJAX
    $.ajax({
        url: '{% url "buscar_ajax" %}', 
        data: data_ajax,
        success: function(data){
            $('#contenedor-productos').fadeOut(150, function(){
                $(this).html(data).fadeIn(150);
            });
        }
    });
});

// LÓGICA DE BÚSQUEDA EN TIEMPO REAL
$('#buscador-realtime').on('keyup', function(){
    let valor = $(this).val();
    let categoria_activa = $('.categoria-filtro.text-dark').data('id'); // Saber qué categoría está seleccionada
    
    let data_ajax = { 'search': valor };
    if (categoria_activa && categoria_activa !== 'todas') {
        data_ajax['categoria_id'] = categoria_activa;
    }

    $.ajax({
        url: '{% url "buscar_ajax" %}', 
        data: data_ajax,
        success: function(data){
            $('#contenedor-productos').html(data);
        }
    });
});

</script>
</body>
</html>
