<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias por tu compra! | VSV Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #111; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .success-card { text-align: center; max-width: 500px; padding: 40px; }
        .check-icon { font-size: 4rem; color: #28a745; background: #e8f5e9; width: 100px; height: 100px; line-height: 100px; border-radius: 50%; margin: 0 auto 30px; }
        h1 { font-weight: 800; letter-spacing: -1px; margin-bottom: 15px; }
        p { color: #666; font-size: 1.1rem; margin-bottom: 40px; line-height: 1.6; }
        .btn-home { background-color: #111; color: white; border-radius: 30px; font-weight: 600; padding: 15px 40px; text-decoration: none; transition: 0.3s; border: none; }
        .btn-home:hover { background-color: #333; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="check-icon">✓</div>
        <h1>¡Pago Confirmado!</h1>
        <p>Tu pedido en <strong>VSV Store</strong> ha sido procesado con éxito. Ya estamos preparando todo para que recibas tus productos lo antes posible.</p>
        <a href="{% url 'index' %}" class="btn-home">Volver a la tienda</a>
    </div>
</body>
</html>
